{% extends 'core/base.html' %}

{% block content %}
    <style>
        .zayavki-login {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px 30px;
            background: #fafafa;
            border-radius: 12px;
            border: 1px solid #e8e8e8;
            text-align: center;
        }
        .zayavki-login h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: #800000;
            margin-bottom: 10px;
        }
        .zayavki-login p {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }
        .zayavki-login input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
            font-family: 'Inter', sans-serif;
        }
        .zayavki-login input[type="password"]:focus {
            outline: none;
            border-color: #800000;
        }
        .zayavki-login button {
            width: 100%;
            padding: 12px;
            background: #800000;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .zayavki-login button:hover {
            background: #1a1a1a;
        }
        .zayavki-login .error {
            color: #c62828;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            margin-bottom: 15px;
            padding: 10px;
            background: #ffebee;
            border-radius: 6px;
        }
    </style>

    <div class="zayavki-login">
        <h2>🔐 Доступ к заявкам</h2>
        <p>Введите пароль для просмотра заявок</p>
        
        <form method="post" action="{% url 'zayavki' %}">
            {% csrf_token %}
            <input type="password" name="password" placeholder="Введите пароль" required>
            <button type="submit">Войти</button>
        </form>
    </div>
{% endblock %}
