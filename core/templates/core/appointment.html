{% extends 'core/base.html' %}

{% block content %}
    <style>
        .form-container {
            max-width: 620px;
            margin: 0 auto 50px;
            background: #ffffff;
            padding: 45px 50px;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: #1a1a1a;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: #1a1a1a;
            background: #fafafa;
            transition: all 0.3s ease;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #800000;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(128, 0, 0, 0.06);
        }
        .form-group textarea {
            height: 120px;
            resize: vertical;
        }
        .helper-text {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: #999999;
            margin-top: 6px;
            font-style: italic;
        }
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin: 30px 0;
        }
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            min-width: 20px;
            margin-top: 2px;
            accent-color: #800000;
            cursor: pointer;
        }
        .checkbox-group label {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #1a1a1a;
            line-height: 1.5;
            cursor: pointer;
        }
        .submit-btn {
            width: 100%;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
            color: #ffffff;
            background-color: #800000;
            padding: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .submit-btn:hover {
            background-color: #1a1a1a;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(128, 0, 0, 0.15);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
        .messages {
            max-width: 620px;
            margin: 0 auto 30px;
        }
        .message {
            padding: 12px 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
        }
        .message-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>

    <h1 class="page-title" style="text-align: center;">ЗАЯВКА</h1>
    
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message {% if message.tags %}message-{{ message.tags }}{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}
    
    <div class="form-container">
        <form method="post" action="{% url 'appointment' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">ФИО</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="problem">Опишите проблему</label>
                <textarea id="problem" name="problem" required></textarea>
                <div class="helper-text">Пожалуйста, опишите вашу ситуацию максимально подробно.</div>
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="agree" name="agree" required>
                <label for="agree">Я согласен(на) на обработку персональных данных</label>
            </div>
            <button type="submit" class="submit-btn">Отправить</button>
        </form>
    </div>
{% endblock %}
