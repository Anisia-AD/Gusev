{% extends 'core/base.html' %}

{% block content %}
    <h1 class="page-title">ЗАЯВКА</h1>
    
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message {% if message.tags %}message-{{ message.tags }}{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}
    
    <div class="form-container">
        <form method="post" action="{% url 'appointment' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">ФИО</label>
                <input type="text" id="name" name="name" placeholder="Иванов Иван Иванович" required>
            </div>
            <div class="form-group">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" name="phone" placeholder="+7 (999) 123-45-67" required>
            </div>
            <div class="form-group">
                <label for="problem">Опишите проблему</label>
                <textarea id="problem" name="problem" placeholder="Опишите вашу ситуацию..." required></textarea>
                <div class="helper-text">Пожалуйста, опишите вашу ситуацию максимально подробно.</div>
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="agree" name="agree" required>
                <label for="agree">Я согласен(на) на обработку персональных данных</label>
            </div>
            <button type="submit" class="submit-btn">Отправить</button>
        </form>
    </div>
{% endblock %}
