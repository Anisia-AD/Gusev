{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Престол Права</title>
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="navbar">
                <a href="{% url 'index' %}" class="logo-link">
                    <img src="{% static 'core/images/logo.png' %}" alt="Логотип" class="logo-img">
                </a>

                <div class="header-center">
                    <div class="title-main">ПРЕСТОЛ</div>
                    <div class="title-sub">ПРАВА</div>
                </div>

                <div class="nav-right">
                    <a href="{% url 'contacts' %}" class="nav-btn-small">Контакты</a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

</body>
</html>
